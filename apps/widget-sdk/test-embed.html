<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test Widget Embed - XenoAI</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      line-height: 1.6;
      background-color: #f0f2f5;
      margin: 0;
      padding: 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .container {
      max-width: 800px;
      background: white;
      padding: 40px;
      border-radius: 24px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.05);
    }
    h1 { color: #1a1a1a; margin-top: 0; }
    p { color: #4b5563; font-size: 18px; }
    .status-badge {
      display: inline-block;
      padding: 6px 12px;
      background: #e0e7ff;
      color: #4338ca;
      border-radius: 99px;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 20px;
    }
    code {
      background: #f3f4f6;
      padding: 2px 6px;
      border-radius: 4px;
      font-family: monospace;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="status-badge">Môi trường Kiểm thử</div>
    <h1>Trang web của khách hàng</h1>
    <p>Đây là trang demo nhúng chatbot widget của <strong>XenoAI</strong>.</p>
    <p>Bạn sẽ thấy nút bong bóng chat xuất hiện ở góc dưới màn hình. Hãy thử click vào và trò chuyện!</p>
    <hr style="border: none; border-top: 1px solid #eee; margin: 30px 0;">
    <p style="font-size: 14px; color: #9ca3af;">
      Widget đang kết nối tới: <code>http://localhost:8001</code><br>
      Public Key: <code>pk_live_YOUR_PUBLIC_KEY</code>
    </p>
  </div>

  <!-- WIDGET SDK EMBED CODE -->
  <!-- Lưu ý: Thay đổi data-public-key bằng key thật từ Dashboard của bạn -->
  <script 
    src="./dist/widget.js"
    data-public-key="pk_live_antigravity_demo_key"
    data-api-endpoint="http://localhost:8001"
    data-bot-name="Antigravity Demo"
    data-color="#2563eb"
    data-placeholder="Hỏi tôi bất cứ điều gì..."
    data-position="bottom-right">
  </script>
</body>
</html>
