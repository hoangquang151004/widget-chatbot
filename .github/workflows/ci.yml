name: CI — Lint, Test, Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

jobs:

  # ── Backend: Lint ─────────────────────────────────────────────────────────
  lint-backend:
    name: Lint Backend (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff
        run: ruff check apps/api/ --select E,F,W,I --ignore E501

  # ── Backend: Tests ────────────────────────────────────────────────────────
  test-backend:
    name: Test Backend (pytest)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER:     test_user
          POSTGRES_PASSWORD: test_pass
          POSTGRES_DB:       test_chatbot
        options: >-
          --health-cmd "pg_isready -U test_user"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 3s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: apps/api/requirements.txt

      - name: Install dependencies
        run: pip install -r apps/api/requirements.txt
        working-directory: .

      - name: Run pytest
        working-directory: apps/api
        env:
          POSTGRES_SERVER:    localhost
          POSTGRES_USER:      test_user
          POSTGRES_PASSWORD:  test_pass
          POSTGRES_DB:        test_chatbot
          REDIS_HOST:         localhost
          REDIS_PORT:         6379
          APP_ENCRYPTION_KEY: ${{ secrets.APP_ENCRYPTION_KEY }}
          GEMINI_API_KEY:     ${{ secrets.GEMINI_API_KEY }}
          ENV:                test
        run: python -m pytest tests/ -v --tb=short --no-header

  # ── Frontend: Build ───────────────────────────────────────────────────────
  build-web:
    name: Build Next.js Dashboard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: apps/web

      - name: TypeScript check
        run: npx tsc --noEmit
        working-directory: apps/web

      - name: Build
        run: npm run build
        working-directory: apps/web
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8001
